#cloud-config
package_update: true

write_files:
  - path: /opt/setup-mongo.sh
    permissions: '0700'
    content: |
      #!/bin/bash
      set -e

      apt-get update -y
      apt-get install -y gnupg curl

      curl -fsSL https://www.mongodb.org/static/pgp/server-4.4.asc | gpg --dearmor -o /usr/share/keyrings/mongodb-server-4.4.gpg
      echo "deb [arch=amd64 signed-by=/usr/share/keyrings/mongodb-server-4.4.gpg] https://repo.mongodb.org/apt/ubuntu focal/mongodb-org/4.4 multiverse" > /etc/apt/sources.list.d/mongodb-org-4.4.list

      apt-get update -y
      apt-get install -y mongodb-org

      # Deliberately insecure: bind to all interfaces, not just localhost.
      sed -i 's/bindIp: 127.0.0.1/bindIp: 0.0.0.0/' /etc/mongod.conf

      systemctl enable mongod
      systemctl start mongod
      sleep 10

      # Auth isn't enabled yet, so this uses Mongo's "localhost exception"
      # to create the first user.
      mongo <<JS
      db = db.getSiblingDB('appdb');
      db.createUser({
        user: "${db_app_username}",
        pwd: "${db_app_password}",
        roles: [ { role: "readWrite", db: "appdb" } ]
      });
      JS

      cat <<CONF >> /etc/mongod.conf
      security:
        authorization: enabled
      CONF

      systemctl restart mongod

runcmd:
  - bash /opt/setup-mongo.sh
