# TEMPLATE — safe to commit. This file holds a PLACEHOLDER password.
#
# Kubernetes Secrets are just base64-encoded (NOT encrypted) key/value
# blobs by default — anyone who can `kubectl get secret -o yaml` this
# object can trivially decode it. That's fine for this exercise (it's
# the standard "DB access via a K8s env variable" pattern the spec asks
# for), but it's exactly why the REAL password must never sit in a file
# that gets committed to git.
#
# Do not `kubectl apply -f` this file directly. Instead:
#   cp k8s/01-secret.yaml k8s/01-secret.local.yaml
#   (edit the password in the copy)
#   kubectl apply -f k8s/01-secret.local.yaml
#
# k8s/*.local.yaml is gitignored, so the real value never reaches git.
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-uri
type: Opaque
stringData:
  # mongodb://<user>:<password>@<mongo-vm-private-ip>:27017/<db>?authSource=<db>
  # authSource=appdb because the app user was created ON the appdb
  # database (db.getSiblingDB('appdb').createUser(...) in cloud-init.yaml),
  # not on Mongo's default "admin" database.
  MONGODB_URI: "mongodb://appuser:CHANGEME@10.0.1.4:27017/appdb?authSource=appdb"
