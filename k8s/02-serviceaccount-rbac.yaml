apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service-account
---
# INTENTIONAL MISCONFIG: this binds our app's ServiceAccount to the
# built-in "cluster-admin" ClusterRole — full, cluster-wide read/write on
# every resource in every namespace, including Secrets, RBAC objects, and
# the ability to create new privileged pods anywhere.
#
# Real-world risk: any container running as this ServiceAccount has its
# token mounted at /var/run/secrets/kubernetes.io/serviceaccount/token by
# default. If that pod is ever compromised (e.g. via a dependency RCE in
# the Node app), the attacker can use that token to talk to the
# Kubernetes API as cluster-admin — read every Secret in the cluster,
# deploy their own pods, or delete anything. This is the "Kubernetes
# equivalent" of the Stage 1 VM having subscription-level Contributor:
# a single compromised workload becomes a full cluster takeover.
#
# The fix (Stage 4/remediation): a scoped Role (or ClusterRole) with
# just the verbs/resources the app actually needs — here, none at all,
# since this app never talks to the Kubernetes API. It shouldn't have a
# ClusterRoleBinding at all; the ServiceAccount should exist only so pods
# don't fall back to the "default" ServiceAccount, and no RBAC should be
# bound to it.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: app-cluster-admin-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: app-service-account
    namespace: default
